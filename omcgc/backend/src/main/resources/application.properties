# Autor             : Gabriel Amílcar Cruz Canto
# Matrícula         : ES1821003109
# Programa          : Licenciatura en Ingeniería en Desarrollo de Software
# Unidad didáctica  : Proyecto Terminal I / Proyecto Terminal II
# Periodo académico : PT1 – PT2 (Agosto 2025 – Enero 2026)
#
# Versión           : v1.2
#
# Propósito:
# Definir los parámetros de configuración en tiempo de ejecución para el
# contenedor de Servlets, ORM (Hibernate) y Logs.
#
# Trazabilidad y Mapeo Funcional:
# ------------------------------------------------------------
# 1. RNF-05 (Configuración):
#    - Puerto del servidor: 9090.
#    - Dialecto SQL: MySQL 8.
#    - Codificación forzada: UTF-8.
# ============================================================
# Nota: La configuración de Base de Datos se ha migrado a:
# com.omcgc.erp.config.DatabaseConfig.java (Configuración Programática)

# --- SERVIDOR ---
server.port=9090
spring.application.name=omcgc-erp-backend

# --- JPA / HIBERNATE ---
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# --- GESTIÓN DE CODIFICACIÓN ---
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
