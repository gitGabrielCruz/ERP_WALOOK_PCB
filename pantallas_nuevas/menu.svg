<svg width="1280" height="900" viewBox="0 0 1280 900" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0');
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 40px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: 'liga';
      }
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
      .icon-sm { font-size: 18px; }
    </style>
  </defs>

  <!-- Fondo Principal -->
  <rect width="1280" height="900" fill="#F4F6F8" />
  
  <!-- 1. HEADER BAR -->
  <rect width="1280" height="64" fill="#FFFFFF" stroke="#DADADA" stroke-width="1" />
  
  <!-- Logo y Branding -->
  <g transform="translate(32, 12)">
    <image href="../omcgc/frontend/assets/img/logo.png" x="0" y="0" width="40" height="40" />
    <g transform="translate(50, 0)">
      <text x="0" y="15" font-size="18" font-weight="bold" fill="#1F3A5F">OPTICA ERP</text>
      <text class="material-symbols-outlined icon-sm" x="110" y="15" fill="#1F3A5F">grid_view</text>
      <text x="0" y="32" font-size="11" fill="#6B6B6B">04/03/2026</text>
    </g>
  </g>
  
  <!-- Status Bar (Derecha) -->
  <g transform="translate(750, 12)">
    <!-- Administrador Principal -->
    <text x="0" y="12" font-size="12" fill="#6B6B6B" text-anchor="end">Administrador Principal</text>
    <text x="0" y="28" font-size="14" font-weight="600" fill="#111827" text-anchor="end">Ing. Gabriel Cruz</text>
    <rect x="5" y="15" width="50" height="18" rx="4" fill="#F3F4F6" />
    <text x="30" y="28" font-size="10" fill="#6B7280" text-anchor="middle">ADMIN</text>
    
    <!-- Separador -->
    <line x1="70" y1="5" x2="70" y2="35" stroke="#DADADA" stroke-width="1" />
    
    <!-- Stats de Tiempo -->
    <g transform="translate(85, 0)">
      <text x="0" y="10" font-size="9" fill="#9CA3AF" font-weight="bold">INGRESO</text>
      <text x="0" y="25" font-size="13" fill="#111827">08:05:22 p.m.</text>
      
      <text x="90" y="10" font-size="9" fill="#9CA3AF" font-weight="bold">ACTUAL</text>
      <text x="90" y="25" font-size="13" fill="#111827">09:58:30 p.m.</text>
      
      <text x="180" y="10" font-size="9" fill="#9CA3AF" font-weight="bold">CONEXIÓN</text>
      <text x="180" y="25" font-size="13" fill="#EF4444" font-weight="bold">00:00:08</text>
    </g>
    
    <!-- Botón Salir -->
    <rect x="420" y="0" width="80" height="40" rx="6" fill="#F43F5E" />
    <text x="460" y="25" font-size="12" font-weight="bold" fill="white" text-anchor="middle">SALIR ✕</text>
  </g>
  
  <!-- 2. MAIN CONTENT -->
  <g transform="translate(140, 100)">
    <!-- Card Principal -->
    <rect width="1000" height="740" rx="12" fill="#FFFFFF" filter="drop-shadow(0 10px 40px rgba(0,0,0,0.06))" />
    
    <!-- Títulos -->
    <text x="500" y="60" font-size="26" font-weight="600" fill="#111827" text-anchor="middle">Menú principal — Módulos del Sistema</text>
    <text x="500" y="85" font-size="15" fill="#9CA3AF" text-anchor="middle">Selecciona un módulo para continuar</text>
    
    <!-- GRID DE MÓDULOS -->
    <g transform="translate(60, 130)">
      
      <!-- Fila 1 -->
      <g transform="translate(0, 0)">
        <!-- LOGIN (En curso / Azul) -->
        <rect width="210" height="150" rx="12" fill="#1F3A5F" stroke="#10B981" stroke-width="3" />
        <text class="material-symbols-outlined" x="105" y="70" fill="white" text-anchor="middle">vpn_key</text>
        <text x="105" y="105" font-size="14" font-weight="bold" fill="white" text-anchor="middle">LOGIN</text>
        <text x="105" y="120" font-size="10" fill="white" fill-opacity="0.7" text-anchor="middle">ACCESO AL SISTEMA</text>
        
        <!-- INVENTARIOS -->
        <rect x="230" y="0" width="210" height="150" rx="12" fill="#F3F4F6" stroke="#10B981" stroke-width="3" />
        <text class="material-symbols-outlined" x="335" y="75" fill="#1F2937" text-anchor="middle">inventory_2</text>
        <text x="335" y="115" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">INVENTARIOS</text>
        
        <!-- AGENDA -->
        <rect x="460" y="0" width="210" height="150" rx="12" fill="#F3F4F6" stroke="#EF4444" stroke-width="3" />
        <text class="material-symbols-outlined" x="565" y="70" fill="#1F2937" text-anchor="middle">calendar_month</text>
        <text x="565" y="105" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">AGENDA</text>
        <text x="565" y="120" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">CITAS</text>
        
        <!-- PROVEEDORES -->
        <rect x="690" y="0" width="210" height="150" rx="12" fill="#F3F4F6" stroke="#10B981" stroke-width="3" />
        <text class="material-symbols-outlined" x="795" y="75" fill="#1F2937" text-anchor="middle">local_shipping</text>
        <text x="795" y="115" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">PROVEEDORES</text>
      </g>
      
      <!-- Fila 2 -->
      <g transform="translate(0, 180)">
        <!-- EXPEDIENTE -->
        <rect width="210" height="150" rx="12" fill="#F3F4F6" stroke="#EF4444" stroke-width="3" />
        <text class="material-symbols-outlined" x="105" y="70" fill="#1F2937" text-anchor="middle">folder_shared</text>
        <text x="105" y="105" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">EXPEDIENTE</text>
        <text x="105" y="120" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">PACIENTE</text>
        
        <!-- CLIENTES -->
        <rect x="230" y="0" width="210" height="150" rx="12" fill="#F3F4F6" stroke="#10B981" stroke-width="3" />
        <text class="material-symbols-outlined" x="335" y="75" fill="#1F2937" text-anchor="middle">groups</text>
        <text x="335" y="115" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">CLIENTES</text>
        
        <!-- VENTAS -->
        <rect x="460" y="0" width="210" height="150" rx="12" fill="#F3F4F6" stroke="#EF4444" stroke-width="3" />
        <text class="material-symbols-outlined" x="565" y="75" fill="#1F2937" text-anchor="middle">point_of_sale</text>
        <text x="565" y="115" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">VENTAS</text>
        
        <!-- COMPRAS -->
        <rect x="690" y="0" width="210" height="150" rx="12" fill="#F3F4F6" stroke="#EF4444" stroke-width="3" />
        <text class="material-symbols-outlined" x="795" y="70" fill="#1F2937" text-anchor="middle">shopping_cart</text>
        <text x="795" y="105" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">ORDENES</text>
        <text x="795" y="120" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">DE COMPRA</text>
      </g>
      
      <!-- Fila 3 -->
      <g transform="translate(0, 360)">
        <!-- TALLER -->
        <rect width="210" height="150" rx="12" fill="#F3F4F6" stroke="#EF4444" stroke-width="3" />
        <text class="material-symbols-outlined" x="105" y="70" fill="#1F2937" text-anchor="middle">build</text>
        <text x="105" y="105" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">TALLER</text>
        <text x="105" y="120" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">OT</text>
        
        <!-- RECEPCION -->
        <rect x="230" y="0" width="210" height="150" rx="12" fill="#F3F4F6" stroke="#EF4444" stroke-width="3" />
        <text class="material-symbols-outlined" x="335" y="70" fill="#1F2937" text-anchor="middle">move_to_inbox</text>
        <text x="335" y="105" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">RECEPCION Y</text>
        <text x="335" y="120" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">DEVOLUCION</text>
        
        <!-- FACTURACION -->
        <rect x="460" y="0" width="210" height="150" rx="12" fill="#F3F4F6" stroke="#EF4444" stroke-width="3" />
        <text class="material-symbols-outlined" x="565" y="75" fill="#1F2937" text-anchor="middle">receipt_long</text>
        <text x="565" y="115" font-size="14" font-weight="bold" fill="#374151" text-anchor="middle">FACTURACION</text>
        
        <!-- USUARIOS -->
        <rect x="690" y="0" width="210" height="150" rx="12" fill="#D1FAE5" stroke="#10B981" stroke-width="3" />
        <text class="material-symbols-outlined" x="795" y="70" fill="#1F2937" text-anchor="middle">manage_accounts</text>
        <text x="795" y="105" font-size="11" font-weight="bold" fill="#374151" text-anchor="middle">USUARIOS, ROLES</text>
        <text x="795" y="120" font-size="11" font-weight="bold" fill="#374151" text-anchor="middle">Y PERMISOS</text>
      </g>
      
    </g>
    
    <!-- Pie de Card -->
    <text x="500" y="715" font-size="12" fill="#9CA3AF" text-anchor="middle">OPTICA ERP — WALOOK MEXICO, S.A. de C.V. · Prototipo de maquetado</text>
    
  </g>
</svg>
