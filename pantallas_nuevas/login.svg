<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0');
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 20px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: 'liga';
      }
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Fondo Principal -->
  <rect width="1280" height="800" fill="#F4F6F8" />
  
  <!-- Contenedor de Login -->
  <g transform="translate(440, 100)">
    
    <!-- Logo Real -->
    <image href="../omcgc/frontend/assets/img/logo.png" x="140" y="0" width="120" height="60" />
    
    <!-- Card de Login -->
    <rect x="0" y="80" width="400" height="480" rx="6" fill="#FFFFFF" stroke="#DADADA" stroke-width="1" />
    
    <!-- Título Login -->
    <text x="200" y="145" font-size="28" font-weight="600" fill="#1F3A5F" text-anchor="middle">Login</text>
    
    <!-- Formulario: Usuario -->
    <text x="40" y="200" font-size="14.4" font-weight="500" fill="#6B6B6B">Usuario</text>
    <rect x="40" y="210" width="320" height="45" rx="6" fill="#FFFFFF" stroke="#DADADA" stroke-width="1" />
    <text x="50" y="238" font-size="16" fill="#9E9E9E">usuario@ejemplo.com</text>
    
    <!-- Formulario: Contraseña -->
    <text x="40" y="290" font-size="14.4" font-weight="500" fill="#6B6B6B">Contraseña</text>
    <rect x="40" y="300" width="320" height="45" rx="6" fill="#FFFFFF" stroke="#DADADA" stroke-width="1" />
    <text x="50" y="328" font-size="16" fill="#9E9E9E">••••••••</text>
    <text class="material-symbols-outlined" x="335" y="330" fill="#2E2E2E">visibility</text>
    
    <!-- Acciones -->
    <rect x="40" y="370" width="16" height="16" rx="2" fill="#FFFFFF" stroke="#DADADA" stroke-width="1" />
    <text x="65" y="383" font-size="14" fill="#2E2E2E">Recuérdame</text>
    
    <!-- Botón Acceder -->
    <rect x="230" y="365" width="130" height="45" rx="6" fill="#1F3A5F" />
    <text x="295" y="393" font-size="16" font-weight="500" fill="#FFFFFF" text-anchor="middle">Acceder</text>
    
    <!-- Link Recuperación -->
    <text x="200" y="450" font-size="14" fill="#1F3A5F" text-anchor="middle" text-decoration="underline" style="cursor:pointer">¿Olvidaste tu contraseña?</text>
    
    <!-- Pie de Aplicación -->
    <text x="200" y="540" font-size="12.8" fill="#9E9E9E" text-anchor="middle">WALOOK México • ERP Cloud System</text>
    
  </g>
</svg>
